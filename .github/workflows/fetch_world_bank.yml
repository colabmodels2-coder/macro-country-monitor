name: Fetch World Bank Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1"

permissions:
  contents: write

jobs:
  fetch-world-bank:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run World Bank fetch script
        run: |
          python scripts/fetch_world_bank.py

      - name: Commit updated raw data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/raw/world_bank/world_bank_real.csv
          git diff --cached --quiet || git commit -m "Update World Bank raw data"
          git push
